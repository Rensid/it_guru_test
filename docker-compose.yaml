services:
  db:
    image: postgres
    env_file:
      - .env.docker
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    restart: always
  app:
    build:
      context: .
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
    - "8001:8000"
    volumes:
    - ./src/:/app/src/
    - ./migrations:/app/migrations
    restart: always
    command: uv run uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
volumes:
  db_data:
